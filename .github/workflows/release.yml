name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_path: dist_electron/CSC Billing*.dmg
            artifact_name: CSC-Billing-macos.dmg
          - os: windows-latest
            artifact_path: dist_electron/CSC Billing*.exe
            artifact_name: CSC-Billing-windows.exe
    name: Build ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build Next.js
        run: npm run build

      - name: Build Electron (${{ matrix.os }})
        run: npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find artifact
        id: find_artifact
        shell: bash
        run: |
          artifact=$(ls -1 ${{ matrix.artifact_path }} 2>/dev/null | head -1)
          if [ -z "$artifact" ]; then
            echo "Error: Artifact not found"
            exit 1
          fi
          echo "path=$artifact" >> $GITHUB_OUTPUT

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_artifact.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    needs: build-and-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null | head -1 || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
